services:
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file: .env
    environment:
      POSTGRES_DB: biblia_db
      POSTGRES_USER: biblia_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-biblia_pass}

  web:
    build: .
    command: gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 4
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    depends_on:
      - db
    env_file: .env
    environment:
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: biblia_db
      DB_USER: biblia_user
      DB_PASSWORD: ${DB_PASSWORD:-biblia_pass}
      DB_HOST: db
      DB_PORT: 5432

  redis:
    image: redis:7-alpine

  celery:
    build: .
    command: celery -A core worker -l info
    volumes:
      - .:/app
    depends_on:
      - redis
      - db
    env_file: .env

volumes:
  postgres_data:
  static_volume:
  media_volume:
