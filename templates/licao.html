{% extends 'base.html' %}
{% load static %}
{% block title %}{{ licao.titulo }} - Plataforma Bíblica{% endblock %}
{% block content %}
<div class="bg-background min-h-screen" x-data="licao()" x-init='init({{ exercicios_data|safe }}, {{ licao.id }})'>

  <template x-if="showResult">
    <div class="fixed inset-0 z-50 bg-background flex items-center justify-center">
      <div class="stat-card max-w-lg w-full mx-4 text-center">
        <div class="w-20 h-20 bg-accent/10 rounded-full flex items-center justify-center mx-auto mb-6">
          <svg class="w-10 h-10 text-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
        </div>
        <h2 class="font-heading text-heading-md text-primary mb-2">Lição Concluída!</h2>
        <div class="py-6">
          <span class="font-heading text-[56px] text-accent" x-text="'+' + xpGained + ' XP'"></span>
        </div>
        <p class="font-body text-text/60 mb-8">Continue sua jornada no mapa de trilhas</p>
        <div class="flex gap-3 justify-center">
          <a href="{% url 'lista_trilhas' %}" class="btn-primary">Voltar ao mapa</a>
          <a href="{% url 'serie_ouro' %}" class="btn-accent">Ver recompensas</a>
        </div>
      </div>
    </div>
  </template>

  <header class="fixed top-0 left-0 right-0 z-40 bg-surface/80 backdrop-blur-md border-b border-muted/30 px-8 py-4">
    <div class="max-w-[680px] mx-auto flex items-center justify-between">
      <div class="flex items-center gap-4">
        <a href="{% url 'lista_trilhas' %}" class="text-text/60 hover:text-primary transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 19l-7-7 7-7"/>
          </svg>
        </a>
        <span class="font-body text-sm text-text/60" x-text="'Questão ' + (currentQuestion + 1) + ' de ' + questions.length"></span>
      </div>
      <span class="font-body text-sm font-medium text-accent" x-text="'+' + xpGained + ' XP'"></span>
    </div>
    <div class="max-w-[680px] mx-auto mt-3">
      <div class="w-full bg-muted rounded-full h-2">
        <div class="bg-primary h-2 rounded-full transition-all duration-500" :style="'width: ' + progress + '%'"></div>
      </div>
    </div>
  </header>

  <main class="pt-28 pb-16 px-4">
    <div class="max-w-[680px] mx-auto">
      <div class="stat-card p-8 relative">
        <div class="mb-8">
          <p class="font-heading text-heading-sm text-primary mb-1" x-text="'Questão ' + (currentQuestion + 1)"></p>
          <h2 class="font-heading text-[24px] text-primary" x-text="currentQ?.pergunta || 'Carregando...'"></h2>
        </div>

        <div class="space-y-3 mb-8">
          <template x-for="(opcao, idx) in currentQ?.opcoes || []" :key="idx">
            <button class="w-full text-left px-5 py-4 rounded-md border transition-all duration-300 font-body text-text"
              :class="{
                'border-primary shadow-soft': selectedOption === idx && !answered,
                'border-muted hover:border-primary hover:shadow-soft': selectedOption !== idx && !answered,
                'border-green-500 bg-green-50': answered && idx === currentQ.correta,
                'border-red-400 bg-red-50 shake': answered && idx === selectedOption && idx !== currentQ.correta,
                'border-muted opacity-60': answered && idx !== selectedOption && idx !== currentQ.correta
              }"
              @click="if(!answered) selectedOption = idx">
              <span x-text="opcao"></span>
            </button>
          </template>
        </div>

        <div class="flex items-center justify-between">
          <div class="relative">
            <button class="flex items-center gap-2 px-4 py-2 rounded-full border border-accent bg-surface text-accent font-body text-sm font-medium hover:shadow-gold transition-all duration-300"
              @click="showDica = !showDica">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
              </svg>
              Pedir Dica
            </button>
            <div x-show="showDica" x-transition:enter="transition ease-out duration-200"
              x-transition:enter-start="opacity-0 translate-y-2" x-transition:enter-end="opacity-100 translate-y-0"
              @click.outside="showDica = false"
              class="absolute bottom-full left-0 mb-2 w-72 bg-surface border border-muted rounded-md p-4 shadow-soft">
              <p class="font-body text-sm text-text">
                <span class="font-medium text-accent">Dica:</span>
                <span x-text="currentQ?.dica || 'Leia o texto base com atenção.'"></span>
              </p>
            </div>
          </div>

          <template x-if="!answered">
            <button class="btn-primary" :class="{ 'opacity-50 cursor-not-allowed': selectedOption === null }"
              :disabled="selectedOption === null" @click="checkAnswer()">
              Verificar
            </button>
          </template>
          <template x-if="answered">
            <div class="flex items-center gap-3">
              <span class="font-body text-sm font-medium" x-text="correct ? '✅ Boa! Você acertou.' : '❌ Resposta incorreta.'"></span>
              <button class="btn-primary" @click="nextQuestion()">Continuar</button>
            </div>
          </template>
        </div>
      </div>
    </div>
  </main>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
  document.addEventListener('alpine:init', () => {
    Alpine.data('licao', () => ({
      currentQuestion: 0,
      selectedOption: null,
      answered: false,
      correct: null,
      showDica: false,
      showResult: false,
      xpGained: 0,
      questions: [],
      licaoId: null,
      checking: false,
      finalizing: false,
      init(questions, licaoId) {
        this.licaoId = licaoId
        this.questions = questions.map(q => ({
          pergunta: q.pergunta || q.enunciado,
          opcoes: q.dados?.alternativas || [],
          correta: q.dados?.indice_correto || 0,
          dica: q.dados?.dica || '',
          tipo: q.tipo,
          id: q.id,
        }))
      },
      get progress() {
        return this.questions.length ? ((this.currentQuestion) / this.questions.length) * 100 : 0
      },
      get currentQ() {
        return this.questions[this.currentQuestion]
      },
      checkAnswer() {
        if (this.selectedOption === null || this.checking) return
        this.checking = true
        fetch('/cursos/licao/' + this.licaoId + '/verificar/', {
          method: 'POST',
          headers: {
            'X-CSRFToken': '{{ csrf_token }}',
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            exercicio_id: this.currentQ.id,
            resposta: this.selectedOption,
          }),
        })
        .then(r => r.json())
        .then(data => {
          this.answered = true
          this.correct = data.correta
          if (data.correta) this.xpGained += data.xp_ganho
          this.checking = false
        })
        .catch(() => { this.checking = false })
      },
      nextQuestion() {
        if (this.currentQuestion < this.questions.length - 1) {
          this.currentQuestion++
          this.selectedOption = null
          this.answered = false
          this.correct = null
          this.showDica = false
        } else {
          if (this.finalizing) return
          this.finalizing = true
          fetch('/cursos/licao/' + this.licaoId + '/finalizar/', {
            method: 'POST',
            headers: { 'X-CSRFToken': '{{ csrf_token }}' },
          })
          .then(r => r.json())
          .then(data => {
            this.xpGained = data.xp_sessao
            this.showResult = true
            this.finalizing = false
          })
          .catch(() => { this.showResult = true; this.finalizing = false })
        }
      }
    }))
  })
</script>
{% endblock %}
