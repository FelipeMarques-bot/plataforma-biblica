{% extends 'base.html' %}
{% load static %}
{% block title %}Mapa de Trilhas - Plataforma Bíblica{% endblock %}
{% block content %}
<div class="bg-background min-h-screen" x-data="trilhas()" x-init='init({{ licoes_data|safe }})'>

  <header class="fixed top-0 left-0 right-0 z-50 glass-header border-b border-muted/30 px-8 py-4 flex items-center justify-between">
    <div class="flex items-center gap-4">
      <a href="{% url 'dashboard' %}" class="text-text/60 hover:text-primary transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 19l-7-7 7-7"/>
        </svg>
      </a>
      <h1 class="font-heading text-heading-sm text-primary" x-text="modulos[0]?.nome || 'Trilhas'">{{ trilha.nome|default:'Trilhas' }}</h1>
    </div>
    <div class="flex items-center gap-3">
      <span class="font-body text-sm text-text/60">{{ user.profile.xp_total }} XP</span>
      <div class="w-8 h-8 bg-accent/20 rounded-full flex items-center justify-center">
        <span class="text-accent text-xs font-bold">{{ user.profile.streak_atual }}</span>
      </div>
    </div>
  </header>

  <main class="pt-24 pb-16 px-4">
    <div class="max-w-2xl mx-auto">
      <div class="relative">
        <div class="absolute left-1/2 top-0 bottom-0 w-1 -translate-x-1/2">
          <div class="absolute top-0 w-full bg-accent transition-all duration-500" style="height: 60%"></div>
          <div class="absolute bottom-0 w-full bg-muted" style="height: 40%"></div>
        </div>

        <div class="relative space-y-24">
          <template x-for="(licao, idx) in modulos[0]?.licoes || []" :key="licao.id">
            <div class="relative flex items-center" :class="idx % 2 === 0 ? 'flex-row' : 'flex-row-reverse'">
              <div class="w-1/2 px-8" :class="idx % 2 === 0 ? 'text-right' : 'text-left'">
                <template x-if="licao.status !== 'locked'">
                  <div>
                    <p class="font-body text-sm text-text/80 font-medium" x-text="licao.titulo"></p>
                    <p class="font-body text-xs text-text/50">Clique para iniciar</p>
                  </div>
                </template>
              </div>
              <div class="absolute left-1/2 -translate-x-1/2 z-10">
                <div class="w-16 h-16 rounded-full flex items-center justify-center cursor-pointer transition-all duration-300"
                  :class="{
                    'bg-surface border-2 border-accent shadow-gold pulse-gold': licao.status === 'active',
                    'bg-surface border-2 border-accent/50 shadow-soft': licao.status === 'completed',
                    'bg-muted border-2 border-muted cursor-not-allowed': licao.status === 'locked'
                  }"
                  @click="openLesson(licao)">
                  <span class="text-xl" :class="{ 'opacity-40': licao.status === 'locked' }" x-text="licao.icone"></span>
                </div>
                <template x-if="licao.status === 'completed'">
                  <div class="absolute -top-1 -right-1 w-5 h-5 bg-accent rounded-full flex items-center justify-center">
                    <svg class="w-3 h-3 text-surface" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/>
                    </svg>
                  </div>
                </template>
              </div>
              <div class="w-1/2"></div>
            </div>
          </template>
        </div>
      </div>
    </div>
  </main>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
  document.addEventListener('alpine:init', () => {
    Alpine.data('trilhas', () => ({
      modulos: [{ nome: 'Trilha', licoes: [] }],
      activeLesson: null,
      init(data) {
        if (data && data.length > 0) {
          this.modulos = [{ nome: 'Trilha', licoes: data }]
        }
      },
      setActive(licao) {
        if (licao.status === 'active' || licao.status === 'completed') {
          this.activeLesson = licao
        }
      },
      openLesson(licao) {
        if (licao.status === 'active') {
          window.location.href = "{% url 'licao' 0 %}".replace('0', licao.id)
        }
      }
    }))
  })
</script>
{% endblock %}
