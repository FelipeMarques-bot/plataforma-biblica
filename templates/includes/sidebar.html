{% load static %}
<aside class="w-[280px] bg-surface border-r border-muted shrink-0 flex flex-col py-8 px-4">
  <div class="px-4 mb-10">
    <h2 class="font-heading text-heading-sm text-primary flex items-center gap-2">
      <span class="w-2 h-2 bg-accent rounded-full inline-block"></span>
      Bíblia Study
    </h2>
  </div>
  <nav class="flex-1 space-y-1">
    <a href="{% url 'dashboard' %}" class="flex items-center gap-3 px-4 py-3 rounded-md {% if request.resolver_match.url_name == 'dashboard' %}bg-primary/5 text-primary font-medium{% else %}text-text/70 hover:bg-primary/5 hover:text-primary{% endif %} transition-all duration-300">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
      Dashboard
    </a>
    <a href="{% url 'lista_trilhas' %}" class="flex items-center gap-3 px-4 py-3 rounded-md text-text/70 hover:bg-primary/5 hover:text-primary transition-all duration-300">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"/></svg>
      Trilhas
    </a>
    <a href="{% url 'desafio_diario' %}" class="flex items-center gap-3 px-4 py-3 rounded-md text-text/70 hover:bg-primary/5 hover:text-primary transition-all duration-300">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
      Desafio Diário
    </a>
    <a href="{% url 'serie_ouro' %}" class="flex items-center gap-3 px-4 py-3 rounded-md text-text/70 hover:bg-primary/5 hover:text-primary transition-all duration-300">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/></svg>
      Série Ouro
    </a>
    <a href="{% url 'recompensas' %}" class="flex items-center gap-3 px-4 py-3 rounded-md text-text/70 hover:bg-primary/5 hover:text-primary transition-all duration-300">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
      Recompensas
    </a>
    <a href="{% url 'chat_devocional' %}" class="flex items-center gap-3 px-4 py-3 rounded-md text-text/70 hover:bg-primary/5 hover:text-primary transition-all duration-300">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
      Chat Devocional
    </a>
  </nav>
  <div class="px-4 mt-6">
    <div class="bg-accent/10 rounded-md p-4 text-center">
      <span class="font-heading text-heading-sm text-accent" x-text="Alpine.$data(document.querySelector('[x-data]'))?.streak || '{{ streak }}'"></span>
      <p class="font-body text-label text-text/60 mt-1">Sequência de estudos</p>
    </div>
  </div>
  <div class="px-4 mt-4">
    <a href="{% url 'logout' %}" class="flex items-center gap-3 px-4 py-3 rounded-md text-text/50 hover:text-red-500 transition-all duration-300 text-sm">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
      Sair
    </a>
  </div>
</aside>
