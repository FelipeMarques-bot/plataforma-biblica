<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trilhas — Plataforma Bíblica</title>
  <link rel="stylesheet" href="css/style.css">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body>
  <div x-data="trilhasApp()" class="flex min-h-screen bg-background">
    <!-- Sidebar -->
    <aside class="w-[280px] bg-surface border-r border-muted flex-shrink-0 flex flex-col">
      <div class="p-6 border-b border-muted">
        <h1 class="font-heading text-primary text-heading font-semibold tracking-tight">Logos</h1>
        <p class="text-small text-text/60 mt-1">Estudo bíblico diário</p>
      </div>
      <nav class="flex-1 p-4 space-y-1">
        <a href="index.html" class="flex items-center gap-3 px-4 py-3 rounded-sm text-text/70 hover:text-primary hover:bg-primary/5 transition-all duration-300">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
          <span>Dashboard</span>
        </a>
        <a href="trilhas.html" class="flex items-center gap-3 px-4 py-3 rounded-sm bg-primary/5 text-primary font-medium transition-all duration-300">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"/></svg>
          <span>Trilhas</span>
        </a>
        <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-sm text-text/70 hover:text-primary hover:bg-primary/5 transition-all duration-300">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
          <span>Desafio diário</span>
        </a>
        <a href="serie-ouro.html" class="flex items-center gap-3 px-4 py-3 rounded-sm text-text/70 hover:text-primary hover:bg-primary/5 transition-all duration-300">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8v13m0-13V6a2 2 0 112 2h-2zm0 0V5.5A2.5 2.5 0 109.5 8H12zm-7 4h14M5 12a2 2 0 110-4h14a2 2 0 110 4M5 12v7a2 2 0 002 2h10a2 2 0 002-2v-7"/></svg>
          <span>Série Ouro</span>
        </a>
        <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-sm text-text/70 hover:text-primary hover:bg-primary/5 transition-all duration-300">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          <span>Recompensas</span>
        </a>
        <a href="chat.html" class="flex items-center gap-3 px-4 py-3 rounded-sm text-text/70 hover:text-primary hover:bg-primary/5 transition-all duration-300">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
          <span>Chat devocional</span>
        </a>
      </nav>
      <div class="p-4 border-t border-muted">
        <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-sm text-text/70 hover:text-primary hover:bg-primary/5 transition-all duration-300">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
          <span>Perfil</span>
        </a>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto relative">
      <!-- Glass Header -->
      <div class="sticky top-0 z-10 glass-header mx-8 mt-4">
        <h2 class="font-heading text-heading-lg text-primary" x-text="'Módulo ' + currentModule.id + ': ' + currentModule.name"></h2>
      </div>

      <!-- Trail Map -->
      <div class="flex flex-col items-center py-12 px-8">
        <div class="relative flex flex-col items-center">
          <template x-for="(node, index) in nodes" :key="index">
            <div class="flex flex-col items-center">
              <!-- Connector Line -->
              <div x-show="index > 0" class="w-1 h-12"
                   :class="node.status === 'locked' ? 'bg-muted' : 'bg-accent'"></div>

              <!-- Node -->
              <button @click="selectNode(node)"
                      x-data="{ hover: false }"
                      @mouseenter="hover = true"
                      @mouseleave="hover = false"
                      class="relative flex flex-col items-center transition-all duration-300"
                      :class="node.status === 'locked' ? 'opacity-50 cursor-not-allowed' : 'cursor-pointer'"
                      :disabled="node.status === 'locked'">
                <!-- Circle -->
                <div class="w-16 h-16 rounded-full flex items-center justify-center transition-all duration-300"
                     :class="{
                       'bg-surface border-2 border-accent shadow-gold animate-pulse-gold': node.status === 'active',
                       'bg-muted border-2 border-muted': node.status === 'locked',
                       'bg-accent/20 border-2 border-accent': node.status === 'completed'
                     }">
                  <span x-html="node.icon" class="w-7 h-7" :class="node.status === 'locked' ? 'opacity-40' : ''"></span>
                </div>

                <!-- Label on hover / always for active -->
                <div x-show="hover || node.status === 'active'"
                     class="mt-2 text-small font-medium text-center whitespace-nowrap"
                     :class="node.status === 'active' ? 'text-accent' : 'text-text/60'">
                  <span x-text="node.label"></span>
                </div>
              </button>
            </div>
          </template>
        </div>
      </div>
    </main>
  </div>

  <script>
    function trilhasApp() {
      return {
        currentModule: { id: 1, name: 'O Princípio' },
        nodes: [
          { status: 'completed', label: 'Gênesis 1–2', icon: '<svg class="w-7 h-7 text-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>' },
          { status: 'active', label: 'Gênesis 3 — A Queda', icon: '<svg class="w-7 h-7 text-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>' },
          { status: 'locked', label: 'Gênesis 4 — Caim e Abel', icon: '<svg class="w-7 h-7 text-text/40" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>' },
          { status: 'locked', label: 'Gênesis 6–9 — Noé', icon: '<svg class="w-7 h-7 text-text/40" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>' },
          { status: 'locked', label: 'Gênesis 12 — Abraão', icon: '<svg class="w-7 h-7 text-text/40" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"/></svg>' },
          { status: 'locked', label: 'Gênesis 15 — Aliança', icon: '<svg class="w-7 h-7 text-text/40" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8v13m0-13V6a2 2 0 112 2h-2zm0 0V5.5A2.5 2.5 0 109.5 8H12zm-7 4h14M5 12a2 2 0 110-4h14a2 2 0 110 4M5 12v7a2 2 0 002 2h10a2 2 0 002-2v-7"/></svg>' },
        ],
        selectNode(node) {
          if (node.status === 'active') {
            window.location.href = 'licao.html';
          }
        }
      }
    }
  </script>
</body>
</html>
