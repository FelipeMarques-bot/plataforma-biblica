<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat Devocional - Plataforma Bíblica</title>
  <link rel="stylesheet" href="../../public/dist/output.css">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script defer src="../js/app.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@500;600&family=Plus+Jakarta+Sans:wght@400;500&display=swap');
  </style>
</head>
<body class="bg-background min-h-screen" x-data="chatDevocional()">

  <div class="flex min-h-screen">

    <!-- Left: Escritura Panel -->
    <div class="w-[420px] shrink-0 bg-[#F4F3F0] border-r border-muted/50 flex flex-col p-8">
      <a href="dashboard.html" class="text-text/60 hover:text-primary transition-colors mb-8 inline-flex items-center gap-2">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 19l-7-7 7-7"/>
        </svg>
        <span class="font-body text-sm">Voltar</span>
      </a>

      <div class="flex-1 flex flex-col justify-center">
        <div class="mb-2">
          <span class="font-body text-label text-accent">Escritura do Dia</span>
        </div>
        <blockquote class="font-heading text-[28px] text-primary leading-relaxed mb-6" x-text="scripture.text">
          O SENHOR é o meu pastor; nada me faltará.
        </blockquote>
        <p class="font-body text-sm text-text/70 mb-3" x-text="'— ' + scripture.reference">
          — Salmos 23:1
        </p>
        <div class="border-t border-muted/50 pt-4">
          <p class="font-body text-sm text-text/60 italic" x-text="scripture.note">
            Uma declaração de confiança total na provisão divina.
          </p>
        </div>
      </div>
    </div>

    <!-- Right: Chat Area -->
    <div class="flex-1 flex flex-col">

      <!-- Header -->
      <header class="bg-surface border-b border-muted/30 px-8 py-4">
        <h2 class="font-heading text-heading-sm text-primary">Chat Devocional</h2>
        <p class="font-body text-sm text-text/60">Reflexão guiada com IA</p>
      </header>

      <!-- Messages -->
      <div class="flex-1 overflow-y-auto px-8 py-6 space-y-4" x-ref="chatContainer">
        <template x-for="(msg, idx) in mensagens" :key="idx">
          <div
            class="flex"
            :class="msg.tipo === 'usuario' ? 'justify-end' : 'justify-start'"
          >
            <div
              class="max-w-[70%] px-5 py-3 rounded-md transition-all duration-300"
              :class="{
                'bg-primary text-surface': msg.tipo === 'usuario',
                'bg-surface text-text shadow-soft': msg.tipo === 'ia'
              }"
            >
              <p class="font-body text-sm leading-relaxed" x-text="msg.texto"></p>
            </div>
          </div>
        </template>

        <!-- Typing indicator -->
        <div x-show="isTyping" class="flex justify-start">
          <div class="bg-surface shadow-soft rounded-md px-5 py-4 flex items-center gap-1">
            <span class="typing-dot w-2 h-2 bg-text/40 rounded-full inline-block"></span>
            <span class="typing-dot w-2 h-2 bg-text/40 rounded-full inline-block"></span>
            <span class="typing-dot w-2 h-2 bg-text/40 rounded-full inline-block"></span>
          </div>
        </div>
      </div>

      <!-- Input -->
      <div class="bg-surface border-t border-muted/30 px-8 py-4">
        <div class="flex items-center gap-3">
          <input
            type="text"
            x-model="inputMessage"
            @keydown.enter="sendMessage()"
            placeholder="Digite sua reflexão..."
            class="flex-1 bg-background border border-muted rounded-md px-5 py-3 font-body text-sm text-text outline-none focus:border-primary transition-colors"
          >
          <button
            @click="sendMessage()"
            class="w-11 h-11 bg-primary rounded-full flex items-center justify-center hover:scale-105 transition-all duration-300"
            :class="{ 'opacity-50': !inputMessage.trim() }"
            :disabled="!inputMessage.trim()"
          >
            <svg class="w-5 h-5 text-surface" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19V5m0 0l-7 7m7-7l7 7"/>
            </svg>
          </button>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
