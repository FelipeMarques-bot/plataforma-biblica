<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Série Ouro - Plataforma Bíblica</title>
  <link rel="stylesheet" href="../../public/dist/output.css">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script defer src="../js/app.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@500;600&family=Plus+Jakarta+Sans:wght@400;500&display=swap');
  </style>
</head>
<body class="bg-[#08162E] min-h-screen" x-data="serieOuro()">

  <div class="min-h-screen">

    <!-- Header -->
    <header class="bg-[#0B2046]/80 border-b border-accent/20 px-8 py-4 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <a href="dashboard.html" class="text-accent/60 hover:text-accent transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 19l-7-7 7-7"/>
          </svg>
        </a>
        <h1 class="font-heading text-heading-sm text-accent">Série Ouro</h1>
      </div>
      <div class="flex items-center gap-2">
        <svg class="w-5 h-5 text-accent" fill="currentColor" viewBox="0 0 24 24">
          <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
        </svg>
        <span class="font-body text-sm text-accent font-medium">1,250 XP</span>
      </div>
    </header>

    <main class="max-w-4xl mx-auto px-8 py-12">

      <!-- Chest Section -->
      <div class="text-center mb-16">
        <h2 class="font-heading text-[32px] text-accent mb-2">Baú Divino</h2>
        <p class="font-body text-sm text-accent/60 mb-8">Complete desafios para desbloquear recompensas</p>

        <!-- Chest -->
        <div class="relative inline-block">
          <div :class="{ 'chest-shake': chestShaking }">
            <!-- Chest Icon (closed) -->
            <template x-if="!aberto">
              <div class="w-60 h-60 mx-auto cursor-pointer" @click="openChest()">
                <svg viewBox="0 0 240 240" fill="none" class="w-full h-full">
                  <!-- Body -->
                  <rect x="40" y="100" width="160" height="100" rx="8" fill="#D4AF37" opacity="0.9"/>
                  <rect x="40" y="100" width="160" height="100" rx="8" stroke="#0B2046" stroke-width="2"/>
                  <!-- Lid -->
                  <path d="M35 100 L120 65 L205 100" fill="#D4AF37" stroke="#0B2046" stroke-width="2"/>
                  <rect x="35" y="95" width="170" height="10" rx="3" fill="#F0D060"/>
                  <!-- Lock -->
                  <circle cx="120" cy="150" r="15" fill="#0B2046"/>
                  <circle cx="120" cy="150" r="8" fill="#D4AF37"/>
                  <!-- Decor -->
                  <line x1="80" y1="120" x2="80" y2="180" stroke="#0B2046" stroke-width="1.5" opacity="0.3"/>
                  <line x1="160" y1="120" x2="160" y2="180" stroke="#0B2046" stroke-width="1.5" opacity="0.3"/>
                </svg>
              </div>
            </template>

            <!-- Chest open animation -->
            <template x-if="aberto">
              <div class="w-60 h-60 mx-auto relative">
                <svg viewBox="0 0 240 240" fill="none" class="w-full h-full">
                  <!-- Body -->
                  <rect x="40" y="100" width="160" height="100" rx="8" fill="#D4AF37" opacity="0.9"/>
                  <rect x="40" y="100" width="160" height="100" rx="8" stroke="#0B2046" stroke-width="2"/>
                  <!-- Lid open -->
                  <path d="M35 100 L120 40 L205 100" fill="#D4AF37" stroke="#0B2046" stroke-width="2" opacity="0.6"/>
                  <!-- Contents -->
                  <text x="120" y="155" text-anchor="middle" font-size="28">✨</text>
                </svg>
                <!-- Light burst -->
                <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                  <div class="w-80 h-80 bg-accent/20 rounded-full light-burst"></div>
                </div>
                <!-- Reward Badge -->
                <template x-if="baúAberto && recompensa">
                  <div class="absolute -bottom-20 left-1/2 -translate-x-1/2 w-64 crossfade">
                    <div class="bg-surface rounded-md p-4 shadow-gold text-center">
                      <span class="text-3xl block mb-2">🏅</span>
                      <p class="font-heading text-heading-sm text-primary" x-text="recompensa.tipo"></p>
                      <p class="font-body text-accent font-medium" x-text="'\"' + recompensa.texto + '\"'"></p>
                      <p class="font-body text-sm text-text/60 mt-1" x-text="'+' + recompensa.xp + ' XP'"></p>
                      <button @click="resetChest()" class="mt-3 text-sm text-primary hover:text-accent font-medium transition-colors">Fechar</button>
                    </div>
                  </div>
                </template>
              </div>
            </template>
          </div>

          <!-- Button -->
          <template x-if="!aberto">
            <div class="mt-6">
              <button
                class="bg-accent text-primary font-heading font-medium text-[15px] px-8 py-3 rounded-full hover:shadow-gold transition-all duration-300"
                @click="openChest()"
              >
                Abrir Baú Divino
              </button>
            </div>
          </template>
        </div>
      </div>

      <!-- Desafios Série Ouro -->
      <div>
        <h3 class="font-heading text-[24px] text-accent mb-6">Desafios de Elite</h3>
        <div class="grid grid-cols-3 gap-6">
          <template x-for="desafio in desafios" :key="desafio.id">
            <div class="bg-[#0B2046] border border-accent/40 rounded-md p-6 hover:shadow-gold transition-all duration-300 cursor-pointer group">
              <div class="w-12 h-12 bg-accent/20 rounded-full flex items-center justify-center mb-4">
                <svg class="w-6 h-6 text-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/>
                </svg>
              </div>
              <h4 class="font-heading text-heading-sm text-surface mb-1" x-text="desafio.nome"></h4>
              <p class="font-body text-sm text-accent/70 mb-3" x-text="desafio.questoes + ' questões'"></p>
              <span class="inline-block font-body text-label text-accent border border-accent/40 px-3 py-1 rounded-full" x-text="desafio.dificuldade"></span>
            </div>
          </template>
        </div>
      </div>

    </main>
  </div>

</body>
</html>
